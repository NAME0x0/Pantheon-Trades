name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile-check every Python source
        run: python tests/_syntax_check.py

  python-unit-tests:
    runs-on: ubuntu-latest
    needs: python-syntax
    strategy:
      fail-fast: false
      matrix:
        service:
          - pantheon-core
          - areopagus
          - boule
          - apollo
          - argos
          - strategos
          - parthenon
          - ostrakon
          - moirai
          - underworld
          - chronos
          - pythia
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip deps
        run: |
          python -m pip install --upgrade pip
          # Keep this list in sync with the dependency surface every
          # service module imports at test time. Heavy / optional deps
          # (chromadb, sentence-transformers, spacy, tradingview-screener,
          # slowapi, alembic, vaderSentiment) stay out — every consumer
          # imports them lazily and tests stub or skip cleanly when absent.
          pip install pytest pytest-asyncio pydantic pydantic-settings tenacity \
            structlog redis httpx anthropic eth-utils "eth-hash[pycryptodome]" \
            web3 numpy scikit-learn apscheduler hypothesis prometheus-client \
            google-generativeai openai
      - name: Run tests for ${{ matrix.service }}
        shell: bash
        run: |
          set -e
          PY_PATH="packages/pantheon-core/src"
          case "${{ matrix.service }}" in
            pantheon-core) DIR="packages/pantheon-core" ;;
            *)             DIR="services/${{ matrix.service }}"; PY_PATH="$PY_PATH:$DIR/src" ;;
          esac
          PYTHONPATH="$PY_PATH" python -m pytest "$DIR/tests" -q

  python-integration:
    runs-on: ubuntu-latest
    needs: python-syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pydantic pydantic-settings tenacity \
            structlog redis httpx anthropic eth-utils "eth-hash[pycryptodome]" \
            web3 numpy scikit-learn apscheduler hypothesis prometheus-client \
            google-generativeai openai
      - run: python -m pytest tests/test_pipeline_integration.py -q

  foundry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # foundryup hits api.github.com to resolve release tags. Without an
      # auth token the runner IP shares the 60-req/hr unauth pool and the
      # request returns 403 under load. GITHUB_TOKEN bumps us to 5000/hr.
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: forge build
        run: forge build --root contracts
      - name: forge test (full suite)
        # Run every Foundry test, including ProofOfRestraint.t.sol — the
        # flagship contract must be exercised in CI, not skipped.
        run: forge test --root contracts -vv

  halmos:
    # Symbolic verification of immutable contracts (ProofOfRestraint,
    # PantheonConstitution). Spec files: contracts/test/*Symbolic.t.sol.
    runs-on: ubuntu-latest
    needs: foundry
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Halmos
        run: pip install halmos
      - name: forge build
        run: forge build --root contracts
      - name: halmos symbolic checks
        run: halmos --root contracts --solver-timeout-assertion 30000
